<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Sleep Stories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
    }

    .hero {
      height: 100vh;
      background: url('your-image.jpg') center/cover no-repeat;
      position: relative;
      color: white;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
    }

    /* TOP RIGHT TEXT */
    .content {
      position: absolute;
      top: 40px;
      right: 40px;
      z-index: 2;
      text-align: right;
      max-width: 400px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    p {
      font-size: 1.1rem;
      margin-top: 10px;
    }

    /* LANGUAGE SWITCH */
    .lang-switch {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 3;
    }

    .lang-switch button {
      margin: 2px;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
    }

    /* EMAIL */
    .email {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 2;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .email a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <!-- Language Switch -->
    <div class="lang-switch">
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('yo')">YO</button>
      <button onclick="setLang('ig')">IG</button>
      <button onclick="setLang('ha')">HA</button>
      <button onclick="setLang('sw')">SW</button>
    </div>

    <!-- Top Right Content -->
    <div class="content">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>

    <!-- Email -->
    <div class="email">
      <a href="mailto:hello@tosleepstories.com">
        hello@tosleepstories.com
      </a>
    </div>

  </div>

  <script>
    const content = {
      en: {
        title: "To Sleep Stories",
        subtitle: "Gentle bedtime stories for peaceful nights 🌙"
      },
      yo: {
        title: "Àwọn Itàn Ìsun",
        subtitle: "Àwọn ìtàn pẹ̀lẹ́pẹ̀lẹ́ fún ìsinmi alẹ́ 🌙"
      },
      ig: {
        title: "Akụkọ Ụra",
        subtitle: "Akụkọ dị nro maka ụra dị jụụ 🌙"
      },
      ha: {
        title: "Labaran Barci",
        subtitle: "Labaran kwantar da hankali 🌙"
      },
      sw: {
        title: "Hadithi za Kulala",
        subtitle: "Hadithi tulivu kwa usingizi mzuri 🌙"
      }
    };

    function setLang(lang) {
      document.getElementById("title").innerText = content[lang].title;
      document.getElementById("subtitle").innerText = content[lang].subtitle;
    }

    setLang('en');
  </script>

</body>
</html>
